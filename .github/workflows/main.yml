name: Flutter Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Move Files
        run: |
          unzip project.zip -d temp_folder
          # חיפוש הקובץ pubspec.yaml כדי למצוא את שורש הפרויקט
          ROOT_DIR=$(find temp_folder -name "pubspec.yaml" -exec dirname {} \;)
          echo "Project root found at: $ROOT_DIR"
          # העברת כל התוכן לשורש הריפוזיטורי
          cp -R $ROOT_DIR/* .
          rm -rf temp_folder

      - name: Fix Pubspec Encoding
        run: |
          cat <<EOF > pubspec.yaml
          name: my_app
          description: Webview app with microphone support
          version: 1.0.0+1
          publish_to: 'none'
          environment:
            sdk: ">=2.17.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.2.2
            permission_handler: ^10.2.0
          flutter:
            uses-material-design: true
            assets:
              - assets/
          EOF

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
